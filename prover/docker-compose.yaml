# Self-hosted Sui zkLogin prover.
#
# WHY: Mysten's public provers don't work for deepfi on testnet —
#   - prover-dev.mystenlabs.com  → devnet proving params → "Groth16 proof verify
#     failed" on testnet.
#   - prover.mystenlabs.com      → testnet params, but ALLOWLISTS audiences and
#     rejects our custom Google client id.
# This runs the production zkey (zkLogin.zkey from the trusted-setup ceremony):
# testnet/mainnet-valid AND accepts ANY audience → works with our Google client.
# Zero app-code change — just point NEXT_PUBLIC_ZKLOGIN_PROVER_URL at it.
#
# ── Setup ───────────────────────────────────────────────────────────────────
# 1) Download the proving key (~1.3 GB, git-lfs):
#      GIT_LFS_SKIP_SMUDGE=1 git clone \
#        https://github.com/sui-foundation/zklogin-ceremony-contributions.git
#      cd zklogin-ceremony-contributions && git lfs pull --include "zkLogin.zkey"
#    Verify it (optional):
#      b2sum zkLogin.zkey
#      → 060beb961802568ac9ac7f14de0fbcd55e373e8f5ec7cc32189e26fb65700aa4e36f5604f868022c765e634d14ea1cd58bd4d79cef8f3cf9693510696bcbcbce
#
# 2) Run it (from this dir):
#      ZKEY=/abs/path/to/zkLogin.zkey PROVER_PORT=8080 docker compose up
#
# 3) Smoke test:  curl http://localhost:8080/ping   → pong
#
# 4) In deepfi/.env.local:
#      NEXT_PUBLIC_ZKLOGIN_PROVER_URL=http://localhost:8080/v1
#    then restart `bun dev`, log out + log back in (the old session holds a proof
#    from the previous prover), and retry "create trading account".
#
# ── Notes ───────────────────────────────────────────────────────────────────
# • Hardware: Mysten recommends 16 cores / 16 GB RAM (~3 s/proof). A small box
#   (2 vCPU / 2 GB) works for a demo but does one proof at a time — keep
#   PROVER_TIMEOUT high. Proofs are cached per session, so traffic is tiny.
# • Proxy gotcha: prover-fe validates the JWT by fetching Google's JWKS
#   (googleapis). Behind a local HTTP proxy that can fail — run this on a clean
#   VM, or pass HTTP(S)_PROXY into the `frontend` container's environment.
services:
  backend:
    image: mysten/zklogin:prover-stable
    volumes:
      - ${ZKEY}:/app/binaries/zkLogin.zkey
    environment:
      - ZKEY=/app/binaries/zkLogin.zkey
      - WITNESS_BINARIES=/app/binaries
  frontend:
    image: mysten/zklogin:prover-fe-stable
    command: "8080"
    ports:
      - "${PROVER_PORT:-8080}:8080"
    environment:
      - PROVER_URI=http://backend:8080/input
      - NODE_ENV=production
      - DEBUG=zkLogin:info,jwks
      # Bump if you see "rapidsnark service took longer than 15s" on a small box.
      - PROVER_TIMEOUT=30
